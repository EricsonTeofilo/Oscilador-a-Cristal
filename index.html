<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador do Oscilador a Cristal</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Simulador do Oscilador a Cristal</h1>

        <div class="equation-box">
            <h2>Equação Diferencial</h2>
            <div id="equation"></div>
        </div>

        <div class="main-content">
            <aside class="controls-panel">
                <h2>Parâmetros da EDO</h2>

                <div class="slider-group">
                    <label>Resistência (R) – amortecimento</label>
                    <div class="slider-line">
                        <input type="range" id="sliderR" min="0.0" max="5.0" step="0.05" value="0.5" />
                        <span id="valR">0.50</span>
                    </div>
                </div>

                <div class="slider-group">
                    <label>Indutância (L)</label>
                    <div class="slider-line">
                        <input type="range" id="sliderL" min="0.1" max="5.0" step="0.05" value="2.4" />
                        <span id="valL">2.40</span>
                    </div>
                </div>

                <div class="slider-group">
                    <label>Capacitância (C)</label>
                    <div class="slider-line">
                        <input type="range" id="sliderC" min="0.1" max="5.0" step="0.05" value="0.5" />
                        <span id="valC">0.50</span>
                    </div>
                </div>

                <div class="slider-group">
                    <label>Amplitude da Força (F₀)</label>
                    <div class="slider-line">
                        <input type="range" id="sliderF0" min="0.0" max="5.0" step="0.05" value="1.0" />
                        <span id="valF0">1.00</span>
                    </div>
                </div>

                <div class="slider-group">
                    <label>Frequência da Força (ω)</label>
                    <div class="slider-line">
                        <input type="range" id="sliderOmega" min="0.1" max="6.0" step="0.05" value="2.0" />
                        <span id="valOmega">2.00</span>
                    </div>
                </div>

                <button id="resetBtn">Reiniciar Simulação</button>
            </aside>

            <section class="graph-panel">
                <canvas id="oscCanvas"></canvas>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
